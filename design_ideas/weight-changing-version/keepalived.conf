global_defs {
    router_id LB_MASTER
    script_user root
    enable_script_security
}

vrrp_script check_vip {
    script "/usr/local/bin/check-vip.sh"
    interval 2
    weight -20
    fall 3
    rise 2
}

vrrp_instance VI_1 {
    state MASTER             # Use BACKUP on the second node
    interface ens5           # External interface
    virtual_router_id 51
    priority 100             # Use 90 on the second node
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass 1234
    }
    virtual_ipaddress {
        172.16.29.100        # The Virtual IP (VIP) clients connect to
    }
}

virtual_server 172.16.29.100 21 {

    delay_loop 3
    protocol TCP

    # lb_algo rr
    lb_algo lc                # Least Connection balancing
    lb_kind NAT               # NAT mode is typical for FTP frontends
    persistence_timeout 1200  # CRITICAL: Keeps data/control ports on same backend

    # VRRP health check for VIP
    virtual_router_id 51
    priority 100
    advert_int 2

    authentication {
        auth_type PASS
        auth_pass keepalived_secret
    }

    track_script {
        check_vip
    }

    # 20 Backend Slots (172.16.32.20-39)
    # Initial state: ALL MARKED DOWN via weight -256

    real_server 172.16.32.20 21 {
        weight 100
        file_check "/var/run/backend-172.16.32.20.healthy" {
            delay 2
        }
    }

    real_server 172.16.32.21 21 {
        weight 100
        file_check "/var/run/backend-172.16.32.21.healthy" {
            delay 2
        }
