[package]
name = "aerostress"
version = "0.1.0"
edition = "2024"

[dependencies]
suppaftp = { version = "8", features = ["tokio"] }
tokio = { version = "1.49.0", features = ["macros", "rt-multi-thread", "fs"] }
tokio-util = { version = "0.7.18", features = ["io"] }
tokio-stream = "0.1.18"
rand = "0.9.2"
