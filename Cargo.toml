[package]
name = "aeroscrape"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "copilot"
path = "src/copilot.rs"

[[bin]]
name = "gemini"
path = "src/gemini.rs"

[dependencies]
ureq = { version = "3.2", default-features = false, features = ["json", "platform-verifier", "rustls-no-provider", "_ring"] }
aws-sigv4 = { version = "1.4", features = ["sign-http"] }
aws-credential-types = "1.2" # Required by aws-sigv4 to hold keys
anyhow = "1.0.102"
chrono = "0.4"
serde_json = "1.0"
serde = { version = "1.0.228", features = ["derive"] }
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.13", features = ["json"] }
prometheus-parse = "0.2"
metrics = "0.24"
metrics_cloudwatch_embedded = "0.10"
reqsign = { version = "0.17", features = ["aws"] }
http = "1.4.0"
sha2 = "0.10.9"
hex = "0.4.3"
async-trait = "0.1.89"
