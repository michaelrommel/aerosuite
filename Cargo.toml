[package]
name = "aeroscaler"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
reqwest = { version = "0.12", features = ["json"] }
sha2 = "0.10"
hmac = "0.12"
hex = "0.4"
serde_json = "1"
serde_urlencoded = "0.7"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
chrono = "0.4"
thiserror = "2"
anyhow = "1"
redis = { version = "0.27", features = ["tokio-comp"] }
