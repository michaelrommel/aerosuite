# dnsmasq configuration for the aeroscale load balancer
#
# Purpose: local caching DNS resolver to absorb transient VPC DNS outages.
#
# Without this, a single dropped DNS packet causes the ASG query to fail
# with EAI_AGAIN, which previously triggered the cleanup pass to treat all
# lease owners as "no longer in the ASG" and disable every backend.
# The cleanup guard added to aeroscale now prevents that, but a local cache
# eliminates the DNS failure entirely under normal operating conditions.

# ── Upstream ──────────────────────────────────────────────────────────────────
# Do not read /etc/resolv.conf for upstream servers — dhcpcd is configured
# with nohook resolv.conf so the file is managed statically, pointing to
# 127.0.0.1.  We hardcode the VPC resolver directly here instead.
no-resolv
no-poll
server=169.254.169.253

# ── Cache ─────────────────────────────────────────────────────────────────────
# 1000 entries is ample for this workload (a handful of AWS service endpoints
# plus the VPC-internal names used by aeroscale and keepalived).
cache-size=1000

# AWS service endpoints (autoscaling.eu-west-2.amazonaws.com etc.) return
# short TTLs (5–10 s) from the VPC resolver.  Without a floor the OS would
# re-resolve on every 5-second polling cycle.  30 s keeps the record alive
# across several cycles while still respecting intentional DNS changes.
min-ttl=30

# Cache negative responses (NXDOMAIN / SERVFAIL) for up to 60 s so that a
# momentary resolver hiccup does not cause a cascade of failed retries.
neg-ttl=60
