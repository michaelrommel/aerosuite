# keepalived.conf — wlc FTP pool with FILE_CHECK dynamic weight control

#
# Prerequisites:
#   modprobe ip_vs_ftp
#   (add to /etc/modules-load.d/ipvs.conf for persistence across reboots)
#
# FTP requires NAT mode so that ip_vs_ftp can rewrite PASV responses and
# automatically track data channel connections. DR mode is not supported.
#
# persistence_timeout ensures that the control connection (port 21) and the
# subsequent data connection (passive ephemeral port) from the same client IP
# are always routed to the same backend.
#
# Weight file values per backend:
#   0            → active   (effective weight 1, receives new connections)
#  -1            → draining (effective weight 0, no new connections, existing complete)
#  -2147483648   → removed  (FAULT state, fully absent from IPVS scheduler)
#
# Activate a backend:
#   echo 0 > /etc/keepalived/weights/backend-<IP>.weight
#
# Drain a backend:
#   echo -1 > /etc/keepalived/weights/backend-<IP>.weight
#
# Remove a backend after draining:
#   echo -2147483648 > /etc/keepalived/weights/backend-<IP>.weight
#
# ─────────────────────────────────────────────────────────────────────────────
# This file is STATIC — do not add backend IPs or VIP addresses here.
#
# The two included files below are regenerated automatically by aeropulse at
# every instance boot, deriving all values from IMDS instance tags:
#
#   aeroftp-vip-outside   → virtual_server IP in backends.conf
#   aeroftp-vip-inside    → VRRP inside instance in vrrp.conf
#   aeroftp-slot-offset   → first slot IP offset within the eth1 subnet
#   aeroftp-slot-count    → number of backend slots (track_file + real_server entries)
#
# Set these tags once in the EC2 launch template with "Resource types: Instances"
# and they propagate to every node that boots from it.
# ─────────────────────────────────────────────────────────────────────────────

global_defs {
	router_id aeroscale
	enable_script_security
}

include /etc/keepalived/vrrp.conf
include /etc/keepalived/backends.conf
