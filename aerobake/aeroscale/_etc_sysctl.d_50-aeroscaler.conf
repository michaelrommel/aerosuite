# ── File descriptors ──────────────────────────────────────────────────────────
# Each FTP session consumes a control socket + one or more data sockets.
# 20 backends × up to 10k sessions each = headroom for 200k file descriptors.
fs.file-max = 200000

# ── Port range ────────────────────────────────────────────────────────────────
# Full ephemeral range for outgoing connections to backends.
# The passive FTP port block is carved out of this via ip_local_reserved_ports
# and updated dynamically by aeroslot on each backend node.
net.ipv4.ip_local_port_range  = 1024 65535
net.ipv4.ip_local_reserved_ports = 20000-49999

# ── IP forwarding ─────────────────────────────────────────────────────────────
# Required for IPVS NAT mode — the LB must forward packets between eth0 and eth1.
net.ipv4.ip_forward = 1

# ── TCP buffer sizes ──────────────────────────────────────────────────────────
# Allow up to 16 MiB per connection; the kernel auto-tunes within this range.
# Sized for the LB forwarding path (eth0 → eth1) under 20k parallel streams.
net.core.rmem_max        = 16777216
net.core.wmem_max        = 16777216
net.ipv4.tcp_rmem        = 4096 87380 16777216
net.ipv4.tcp_wmem        = 4096 65536 16777216

# ── TCP performance ───────────────────────────────────────────────────────────
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_fastopen       = 3

# ── Connection queues ─────────────────────────────────────────────────────────
net.core.netdev_max_backlog = 10000
net.core.somaxconn          = 10000

# ── TCP keepalive ─────────────────────────────────────────────────────────────
# After a keepalived failover the LB's own sockets to backends may go dark.
# Keepalive probes detect the dead far end and trigger RST/close.
# Dead interval: 60 + (10 × 6) = 120 s  (vs. the 2-hour kernel default).
net.ipv4.tcp_keepalive_time   = 60
net.ipv4.tcp_keepalive_intvl  = 10
net.ipv4.tcp_keepalive_probes = 6

# ── TIME_WAIT and FIN tuning ──────────────────────────────────────────────────
# Recycle TIME_WAIT sockets quickly to avoid port exhaustion under high churn.
net.ipv4.tcp_tw_reuse       = 1
net.ipv4.tcp_max_tw_buckets = 262144
net.ipv4.tcp_fin_timeout    = 30

# ── nf_conntrack ──────────────────────────────────────────────────────────────
# In IPVS NAT mode conntrack tracks every forwarded flow.
#
# established: 1800 s (30 min) — long enough for idle FTP control connections
#   during large transfers, but not so long that post-failover stale entries
#   linger for hours.  The previous value of 3600 s was excessive.
#
# close_wait / fin_wait / time_wait / last_ack: aggressive values so that
#   half-closed connections from failed backends drain quickly.
net.netfilter.nf_conntrack_max                     = 262144
net.netfilter.nf_conntrack_tcp_timeout_established = 1800
net.netfilter.nf_conntrack_tcp_timeout_close_wait  = 30
net.netfilter.nf_conntrack_tcp_timeout_fin_wait    = 30
net.netfilter.nf_conntrack_tcp_timeout_time_wait   = 60
net.netfilter.nf_conntrack_tcp_timeout_last_ack    = 30

# ── IPVS connection timeouts ──────────────────────────────────────────────────
# Controls how long the IPVS table retains entries for inactive sessions.
# The defaults (tcp=900 s, tcpfin=120 s) are far too generous — a post-failover
# stale IPVS entry would block new connections to the same tuple for 15 minutes.
# Reducing tcp to 90 s matches our TCP keepalive dead interval (120 s) with
# enough slack that a healthy idle session is not evicted prematurely.
# These are equivalent to: ipvsadm --set 90 30 300
net.ipv4.vs.timeout_tcp     = 90
net.ipv4.vs.timeout_tcp_fin = 30
net.ipv4.vs.timeout_udp     = 300

# ── Routing and security ──────────────────────────────────────────────────────
# Strict reverse-path filtering on all interfaces.
# eth1 is intentionally asymmetric: the aeromon Prometheus scraper
# (172.16.25.68 / 172.16.16.0/20) reaches 172.16.32.15 via the AWS fabric
# router, so strict rp_filter would drop its SYNs as martians.
# Rather than relaxing rp_filter globally, the keepalived start_pre hook sets
# net.ipv4.conf.eth1.src_valid_mark=1 at runtime so that rp_filter's FIB
# lookup uses the packet mark (set by the nftables PRE chain) and validates
# the path via table 101 instead of the main table.
net.ipv4.conf.all.rp_filter = 1

# Log martians on data-plane and HA interfaces — a martian indicates
# asymmetric routing or a misconfigured route on the VPC.
net.ipv4.conf.eth0.log_martians = 1
net.ipv4.conf.eth1.log_martians = 1
net.ipv4.conf.eth2.log_martians = 1

# vxlan0 is a virtual point-to-point tunnel — its traffic arrives with a
# source address that has no matching local route, so rp_filter must be
# disabled to prevent the kernel from silently dropping tunnel packets.
net.ipv4.conf.vxlan0.rp_filter = 0
