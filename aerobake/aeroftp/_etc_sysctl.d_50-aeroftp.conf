# ── File descriptors ──────────────────────────────────────────────────────────
# Each FTP session uses a control socket and one or more data sockets.
# Allow generous headroom above the expected per-node session count.
fs.file-max = 200000

# ── TCP buffer sizes ──────────────────────────────────────────────────────────
# Sized for high-throughput FTP data transfers.
# The kernel auto-tunes within the min/default/max triple.
net.core.rmem_max  = 16777216
net.core.wmem_max  = 16777216
net.ipv4.tcp_rmem  = 4096 87380 16777216
net.ipv4.tcp_wmem  = 4096 65536 16777216

# ── TCP keepalive ─────────────────────────────────────────────────────────────
# THE most important post-failover setting on the backend.
#
# After a keepalived master switchover the load balancer's virtual IP moves to
# the new master.  The backend has no way to detect this — from its perspective
# the client (the VIP) has simply gone silent.  Without keepalive the kernel
# will hold the socket in ESTABLISHED state indefinitely.
#
# With these settings the backend probes a silent connection after 60 s of
# inactivity, retries every 10 s for 6 attempts, and closes the socket after
# roughly 120 s total — preventing the stale session pile-up that causes
# backends to appear "stuck" after a failover.
#
# Note: SO_KEEPALIVE must be set on the application socket.  unftp and most
# FTP daemons enable this by default; verify with ss -t -o if unsure.
net.ipv4.tcp_keepalive_time   = 60
net.ipv4.tcp_keepalive_intvl  = 10
net.ipv4.tcp_keepalive_probes = 6

# ── TIME_WAIT and FIN tuning ──────────────────────────────────────────────────
# Recycle TIME_WAIT sockets quickly and shorten the FIN_WAIT2 linger time.
# Important for backends handling rapid connection turnover on data channels.
net.ipv4.tcp_tw_reuse    = 1
net.ipv4.tcp_fin_timeout = 30

# ── Connection queues ─────────────────────────────────────────────────────────
net.core.somaxconn = 4096

# ── Port reservation ──────────────────────────────────────────────────────────
# Passive FTP port range — updated dynamically by aeroslot on slot assignment.
# The value below is the default; the running aeroslot service overwrites it.
net.ipv4.ip_local_reserved_ports = 20000-49999

# ── Routing and security ──────────────────────────────────────────────────────
# Strict reverse-path filtering.
net.ipv4.conf.all.rp_filter = 1

# Log martians to catch asymmetric routing issues.
net.ipv4.conf.eth0.log_martians = 1
net.ipv4.conf.eth1.log_martians = 1

# Required so the kernel considers the fwmark when evaluating the reverse path.
# IPVS NAT mode sets fwmarks on forwarded packets — without this, rp_filter
# would drop the LB's SNAT traffic arriving on eth1 as a martian.
net.ipv4.conf.eth0.src_valid_mark = 1
