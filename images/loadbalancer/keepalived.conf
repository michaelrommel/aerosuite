   global_defs {
       router_id LB_MASTER
       script_user root
       enable_script_security
   }

   vrrp_script check_vip {
       script "/usr/local/bin/check-vip.sh"
       interval 2
       weight -20
       fall 3
       rise 2
   }

   virtual_server 192.168.1.100 80 {
       delay_loop 3
       lb_algo rr
       lb_kind NAT
       persistence_timeout 5
       protocol TCP

       # VRRP health check for VIP
       virtual_router_id 51
       priority 100
       advert_int 2

       authentication {
           auth_type PASS
           auth_pass keepalived_secret
       }

       track_script {
           check_vip
       }

       # 20 Backend Slots (172.16.32.20-39)
       # Initial state: ALL MARKED DOWN via weight -256

       real_server 172.16.32.20 80 {
           weight 100
           file_check "/var/run/backend-172.16.32.20.healthy" {
               delay 2
           }
       }

