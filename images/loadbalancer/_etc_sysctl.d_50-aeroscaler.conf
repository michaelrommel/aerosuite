#Increase maximum number of open files (essential for 20k sockets)
fs.file-max=200000

# Expand the local port range for outgoing connections to backends
net.ipv4.ip_local_port_range=1024 65535
net.ipv4.ip_local_reserved_ports=30000-49999

# Enable routing
net.ipv4.ip_forward=1

# TCP Window Scaling and Fast Open for high-throughput transfers
net.ipv4.tcp_window_scaling=1
net.ipv4.tcp_fastopen=3

# High-concurrency connection tracking (Crucial for AWS)
# Formula: Connections * 2 (for safety)
net.netfilter.nf_conntrack_max=262144
net.netfilter.nf_conntrack_tcp_timeout_established=3600

# Aggressive recycling of TIME_WAIT sockets
# This prevents "Address already in use" errors during high churn
net.ipv4.tcp_tw_reuse=1
net.ipv4.tcp_max_tw_buckets=262144

# Increase TCP buffer sizes for 20k parallel streams (RAM dependent)
# These values allow roughly 16MB per connection if needed
net.core.rmem_max=16777216
net.core.wmem_max=16777216
net.ipv4.tcp_rmem=4096 87380 16777216
net.ipv4.tcp_wmem=4096 65536 16777216

# Increase the "Backlog" - how many connections can wait for a handshake
net.core.netdev_max_backlog=10000
net.core.somaxconn=10000

# keep the strict reverse path filtering
# if there are problems with the routing, try 2 first to narrow down the cause
net.ipv4.conf.all.rp_filter=1
# we want to log all martians, they are a symptom for asymmetric routing
net.ipv4.conf.eth0.log_martians=1
net.ipv4.conf.eth1.log_martians=1
