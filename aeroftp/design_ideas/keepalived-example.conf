# Keepalived Configuration Example for 3-State Backend Management
# IP Range: 172.16.32.20-39 (20 slots)

global_defs {
    router_id LB_MASTER
    script_user root
    enable_script_security
}

vrrp_script check_vip {
    script "/usr/local/bin/check-vip.sh"
    interval 2
    weight -20
    fall 3
    rise 2
}

virtual_server 192.168.1.100 80 {
    delay_loop 3
    lb_algo rr
    lb_kind NAT
    persistence_timeout 5
    protocol TCP
    
    virtual_router_id 51
    priority 100
    advert_int 2
    
    authentication {
        auth_type PASS
        auth_pass keepalived_secret
    }
    
    track_script {
        check_vip
    }
    
    # ============================================================
    # 20 Backend Slots - All start DISABLED (no state files)
    # State management via misc_check:
    #   - ENABLED : Create backend-172.16.32.<x>.healthy only
    #   - DRAINING: Create both .healthy AND .draining markers
    #   - DISABLED: Remove all state files
    # ============================================================
    
    real_server 172.16.32.20 80 {
        weight 100
        
        misc_check "/usr/local/bin/backend-state-check.sh 20" {
            delay 2
        }
    }
    
    real_server 172.16.32.21 80 {
        weight 100
        
        misc_check "/usr/local/bin/backend-state-check.sh 21" {
            delay 2
        }
    }
    
